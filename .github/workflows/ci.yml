name: CI

on:
  push:
    branches: [main, dev_route_1, dev_route_1_attractor_v1]
  pull_request:
    branches: [main, dev_route_1]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"
      - name: Fast tests (excludes heavy)
        run: |
          python -m pytest -q -m "not heavy and not gpu" --tb=short
      - name: mypy (ts_attractor only)
        run: |
          python -m mypy ts_attractor --ignore-missing-imports
